<!-- text detail section -->
<section class="text-detail">
    <div class="container">
        <h1>{{text_title}}</h1>
        
        <div class="text-meta">
            <p class="text-date">{{text_date}}</p>
        </div>
        
        <div class="text-content">
            {{text_body}}
        </div>
        
        <div class="text-nav">
            {{text_prev_next}}
        </div>
    </div>
</section>
